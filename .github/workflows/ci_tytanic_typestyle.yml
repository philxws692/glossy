name: Continuous Integration

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  tytanic_typstyle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Install the Typst compiler
      - name: Install Typst
        uses: typst-community/setup-typst@v3

      # 2. Install Tytanic (the test runner)
      # Using taiki-e/install-action is much faster than 'cargo install'
      - name: Install Tytanic
        uses: taiki-e/install-action@v2
        with:
          tool: tytanic

      # 3. Check formatting with typstyle (fail fast before running tests)
      - name: Check Typstyle Formatting
        uses: typstyle-rs/typstyle-action@v0.9.3
        with:
          opts: --check
          inputs: .

      # 4. Run the tests
      - name: Run Tests
        run: tt run --no-fail-fast